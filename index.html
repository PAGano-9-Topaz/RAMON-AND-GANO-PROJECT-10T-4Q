<head>

    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- BOOTSTRAP -->

    rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
    crossorigin="anonymous">
</head>
<body>
    <div class="navbar navbar-expand-sm bg-warning py-3">

		<div class="container-fluid">
			<!-- logo -->
			<a class=" Navname navbar-brand animate__bounceInLeft" href="#">
      			<strong> Aki School </strong> <small> inc. </small>
    		</a>
    		<!-- links -->
            <div class="Choices">
                <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/PAGano-9-Topaz/LINK-1-4Q-10T">Attendance tracker</a>
                </li>
                <li class="nav-item"> 
                    <a class="nav-link" href="https://github.com/PAGano-9-Topaz/RAMON-AND-GANO-PROJECT-10T-4Q">Classmate list</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://pagano-9-topaz.github.io/LINK-2-1Q-10T/">School activities</a>
                </li>
                </ul>
            </div>
            <div class="aj">
                <div class="Welcome2">
                    <center> <img src="logo2.png" class="rounded-pill Photo1"> </center>
                </div>
            </div>
		</div>
    </div>
    <div class="container bg-warning mt-5 mb-5 rounded shadow p-5">
        <form>
            <div class="container">
                 <center><h1> <strong>Add a classmate</strong></h1></center>
                <div class="col-sm-6 mb-3">
                    <h3> Add the name of the student</h3>
                    <input type="text" id="Input1" placeholder="Enter Name"><br><br>
                    <h3> Select your classroom</h3>
                    <select id="Select" class="rounded bg-light">
                        <option value="Topaz"> Topaz</option>
                        <option value="Emerald"> Emerald</option>
                        <option value="Ruby"> Ruby</option>
                        <option value="Sapphire"> Sapphire</option>
                    </select>
                    <br><br>
                    <h3> Select your favorite subject</h3>
                    <select id="Select2" class="rounded bg-light">
                        <option value="SS"> SS</option>
                        <option value="Filipino"> Filipino</option>
                        <option value="English"> English</option>
                        <option value="Science"> Science</option>
                        <option value="Math"> Math</option>
                        <option value="PE"> PE</option>
                        <option value="ICT"> ICT</option>
                        <option value="TLE"> TLE</option>
                        <option value="Music"> Music</option>
                        <option value="CAT"> CAT</option>
                        <option value="VE"> VE</option>
                    </select><br><br>
                    <input type="button" class="btn btn-light rounded" py-click="newclassmate" value="Add to list" class="btn btn-light border-dark">
                    <input type="button" class="btn btn-light rounded" py-click="something" value="Show the list" class="btn btn-light border-dark"><br>
                </div>
            </div>
        </form>
        <br>
    </div>
    <div class="container bg-warning mt-5 mb-5 rounded shadow p-5">
        <h3> Classmate list</h3>
        <div id="output" class="text-muted">

        </div>
    </div>
    <py-script src="main.py"></py-script>
